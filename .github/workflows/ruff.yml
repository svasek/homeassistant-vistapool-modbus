name: Ruff Lint

on:
  workflow_dispatch:
  push:
    paths:
      - "custom_components/vistapool/**"
      - "tests/**"
  pull_request:
    paths:
      - "custom_components/vistapool/**"
      - "tests/**"

permissions:
  contents: read

jobs:
  ruff-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade ruff

      - name: Run Ruff format check
        # Fail on PR, Pass on main
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "On main branch, running Ruff format check (but will not fail if not clean)."
            ruff format --check custom_components/vistapool tests || echo "::warning file=Ruff::Some files would be reformatted"
          else
            echo "On PR or other branch, running Ruff format check (will fail if not clean)."
            ruff format --check custom_components/vistapool tests
          fi

      - name: Run Ruff lint check
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "On main branch, running Ruff lint check (but will not fail if not clean)."
            ruff check custom_components/vistapool tests || echo "::warning file=Ruff::Linting issues found"
          else
            echo "On PR or other branch, running Ruff lint check (will fail if not clean)."
            ruff check custom_components/vistapool tests
          fi
