name: Ruff Lint

on:
  workflow_dispatch:
  push:
    paths:
      - "custom_components/vistapool/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - ".github/workflows/ruff.yml"
  pull_request:
    paths:
      - "custom_components/vistapool/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - ".github/workflows/ruff.yml"

permissions:
  contents: read

jobs:
  ruff-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade ruff

      - name: Run Ruff format check
        # Fail on PR, warn on push (main or other branches)
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Pull request — running Ruff format check (will fail if not clean)."
            ruff format --check custom_components/vistapool tests
          else
            echo "Push event — running Ruff format check (will not fail if not clean)."
            ruff format --check custom_components/vistapool tests || echo "::warning file=Ruff::Some files would be reformatted"
          fi

      - name: Run Ruff lint check
        # Fail on PR, warn on push (main or other branches)
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Pull request — running Ruff lint check (will fail if not clean)."
            ruff check custom_components/vistapool tests
          else
            echo "Push event — running Ruff lint check (will not fail if not clean)."
            ruff check custom_components/vistapool tests || echo "::warning file=Ruff::Linting issues found"
          fi
